name: Deploy demo

# Builds the public/ sandbox and commits the static output straight into
# docs/ on main. GitHub Pages is already configured to serve this repo's
# main branch, so this only needs "Settings > Pages > Branch: main, Folder:
# /docs" - no GitHub Actions Pages permissions/environment to wire up.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn build:demo
      - run: touch docs/.nojekyll
      - name: Commit demo output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --cached --quiet && echo "Demo unchanged" || git commit -m "Update demo site [skip ci]"
          git push
